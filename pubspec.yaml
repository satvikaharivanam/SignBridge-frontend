name: sign
description: SignBridge - Sign Language Recognition App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera
  camera: ^0.10.5+9

  # ML / image
  tflite_flutter: ^0.10.4
  image: ^4.1.3

  # Speech
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0

  # Network
  http: ^1.2.0

  # Utils
  permission_handler: ^11.3.0
  gap: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/models/